---
# ============================================================================
# Sample extra-vars for oracle_rac_patch_with_evidence.yml
# ----------------------------------------------------------------------------
# Pass these through an AAP Job Template survey or --extra-vars.
# ============================================================================

# --- required ---------------------------------------------------------------
# Ordered, comma-separated RAC node hostnames. They are patched ONE AT A TIME,
# in this exact order. The last node runs datapatch (see DATAPATCH_ON).
HOSTNAMES: "rac01,rac02"

# Patch number. After unzip the top directory must be <PATCH_STAGE_DIR>/<PATCH_ID>.
PATCH_ID: "36582629"

# Full path to the patch .zip (including filename, NOT just the folder).
# By default (PATCH_SRC_LOCATION=node) this path is ON THE TARGET NODE - the
# .zip must already be staged there. Set PATCH_SRC_LOCATION=controller to
# instead copy it from the AAP controller/EE (which then requires the path to
# exist inside the Execution Environment).
PATCH_SRC: "/u02/oracle/patches/p36582629_190000_Linux-x86-64.zip"

# node (default) = .zip already on the target host | controller = copy from EE.
PATCH_SRC_LOCATION: "node"

# --- action -----------------------------------------------------------------
# Check = stage + `opatchauto apply -analyze` only (read-only, no downtime).
# Apply = full rolling patch + datapatch + restore of the baseline state.
ACTION: "Check"

# --- optional (shown with their defaults) -----------------------------------
# PATCH_STAGE_DIR: "/u01/stage/samurai-shield/patches"
# GRID_HOME: "/u01/app/19.0.0/grid"        # default: auto-detected from /etc/oracle/olr.loc
# ORACLE_HOMES: ""                          # csv to restrict opatchauto (-oh); default = GI + ALL DB homes
# GRID_USER: "grid"                         # fallback owner of the GI home (real owner is auto-detected)
# ORACLE_USER: "oracle"                     # fallback owner of the DB homes (real owner is auto-detected)
# RUN_DATAPATCH: true
# DATAPATCH_ON: "last"                      # last | each | never
# OPATCHAUTO_EXTRA_ARGS: ""
# EVIDENCE_BASE_DIR: "/var/tmp/samurai-shield/oracle-rac-patch"
# LOG_LEVEL: "detail"                       # summary | detail | full
